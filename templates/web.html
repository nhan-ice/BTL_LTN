<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Giám sát Không khí AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; text-align: center; }
        .container { width: 90%; margin: 30px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #e0e0e0; border-radius: 8px; font-weight: bold; font-size: 15px; transition: 0.3s; }
        .tab-btn:hover { background: #bdbdbd; }
        .tab-btn.active { background: #2196f3; color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .aqi-box { margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 18px; text-align: center; transition: 0.3s; border: 1px solid #ccc; }
        .aqi-title { font-weight: bold; font-size: 22px; margin-bottom: 5px; }
        .aqi-desc { font-size: 16px; }

        .bg-tot { background-color: #00e400; color: black; border-color: #00a000;} 
        .bg-tb { background-color: #ffff00; color: black; border-color: #c0c000;}
        .bg-kem { background-color: #ff7e00; color: white; border-color: #c05c00;}
        .bg-xau { background-color: #ff0000; color: white; border-color: #a00000;}
        .bg-ratxau { background-color: #8f3f97; color: white; border-color: #5c2861;}
        .bg-nguyhai { background-color: #7e0023; color: white; border-color: #4d0015;}
    </style>
</head>
<body>

<div class="container">
    <h2>BIỂU ĐỒ GIÁM SÁT CHẤT LƯỢNG KHÔNG KHÍ</h2>
    
    <div id="aqiWarningBox" class="aqi-box">
        <div class="aqi-title">Đang chờ dữ liệu...</div>
        <div class="aqi-desc">Hệ thống đang kết nối với trạm quan trắc</div>
    </div>

    <div class="tabs" style="margin-top: 25px;">
        <button class="tab-btn active" onclick="openTab(event, 'tab_Rel_IAQ')">Rel_IAQ</button>
        <button class="tab-btn" onclick="openTab(event, 'tab_IAQ')">IAQ</button>
        <button class="tab-btn" onclick="openTab(event, 'tab_TVOC')">TVOC</button>
        <button class="tab-btn" onclick="openTab(event, 'tab_eCO2')">eCO2</button>
        <button class="tab-btn" onclick="openTab(event, 'tab_EtOH')">EtOH</button>
        <button class="tab-btn" onclick="openTab(event, 'tab_Temp')">Nhiệt độ</button>
        <button class="tab-btn" onclick="openTab(event, 'tab_Humidity')">Độ ẩm</button>
    </div>

    <div id="tab_Rel_IAQ" class="tab-content active"><canvas id="chart_Rel_IAQ"></canvas></div>
    <div id="tab_IAQ" class="tab-content"><canvas id="chart_IAQ"></canvas></div>
    <div id="tab_TVOC" class="tab-content"><canvas id="chart_TVOC"></canvas></div>
    <div id="tab_eCO2" class="tab-content"><canvas id="chart_eCO2"></canvas></div>
    <div id="tab_EtOH" class="tab-content"><canvas id="chart_EtOH"></canvas></div>
    <div id="tab_Temp" class="tab-content"><canvas id="chart_Temp"></canvas></div>
    <div id="tab_Humidity" class="tab-content"><canvas id="chart_Humidity"></canvas></div>
</div>

<script>
    Chart.register(ChartDataLabels);

    function openTab(evt, tabName) {
        let tabcontent = document.getElementsByClassName("tab-content");
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }
        let tablinks = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    function updateAQIWarning(aqiValue) {
        const warningBox = document.getElementById('aqiWarningBox');
        let levelName = "";
        let message = "";
        let cssClass = "";

        if (aqiValue <= 50) {
            levelName = "TỐT"; message = "Không ảnh hưởng đến sức khỏe"; cssClass = "bg-tot";
        } else if (aqiValue <= 100) {
            levelName = "TRUNG BÌNH"; message = "Ở mức chấp nhận được. Nhóm nhạy cảm nên hạn chế thời gian ra ngoài"; cssClass = "bg-tb";
        } else if (aqiValue <= 150) {
            levelName = "KÉM"; message = "Ảnh hưởng xấu đến sức khỏe Nhóm nhạy cảm. Nhóm nhạy cảm nên hạn chế thời gian ra ngoài"; cssClass = "bg-kem";
        } else if (aqiValue <= 200) {
            levelName = "XẤU"; message = "Nhóm nhạy cảm tránh ra ngoài. Những người khác hạn chế ra ngoài"; cssClass = "bg-xau";
        } else if (aqiValue <= 300) {
            levelName = "RẤT XẤU"; message = "Cảnh báo sức khỏe khẩn cấp. Ảnh hưởng đến tất cả cư dân"; cssClass = "bg-ratxau";
        } else {
            levelName = "NGUY HẠI"; message = "Báo động: Có thể ảnh hưởng nghiêm trọng đến sức khỏe mọi người"; cssClass = "bg-nguyhai";
        }

        warningBox.className = "aqi-box " + cssClass;
        warningBox.innerHTML = `
            <div class="aqi-title">Chỉ số AQI hiện tại: ${aqiValue} - ${levelName}</div>
            <div class="aqi-desc">${message}</div>
        `;
    }

    const labelsData = []; 
    const charts = {};     
    
    function createChart(ctxId, labelName, color) {
        const ctx = document.getElementById(ctxId).getContext('2d');
        return new Chart(ctx, {
            type: 'line',
            data: {
                labels: labelsData, 
                datasets: [{
                    label: labelName,
                    data: [],
                    borderColor: color,
                    backgroundColor: color.replace('1)', '0.2)'),
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: { 
                animation: false,
                plugins: {
                    // Cấu hình hiện số trên đồ thị
                    datalabels: {
                        align: 'top', 
                        color: color, 
                        font: { weight: 'bold', size: 11 },
                        formatter: function(value) {
                            return Math.round(value * 100) / 100; 
                        }
                    }
                },
                layout: {
                    padding: { top: 30 } 
                }
            }
        });
    }

    charts['Rel_IAQ']  = createChart('chart_Rel_IAQ', 'Chỉ số Rel_IAQ', 'rgba(33, 150, 243, 1)'); 
    charts['IAQ']      = createChart('chart_IAQ', 'Chỉ số IAQ', 'rgba(244, 67, 54, 1)');      
    charts['TVOC']     = createChart('chart_TVOC', 'Nồng độ TVOC', 'rgba(76, 175, 80, 1)');   
    charts['eCO2']     = createChart('chart_eCO2', 'Nồng độ eCO2', 'rgba(255, 152, 0, 1)');   
    charts['EtOH']     = createChart('chart_EtOH', 'Nồng độ EtOH', 'rgba(156, 39, 176, 1)');  
    charts['Temp']     = createChart('chart_Temp', 'Nhiệt độ (°C)', 'rgba(233, 30, 99, 1)');  
    charts['Humidity'] = createChart('chart_Humidity', 'Độ ẩm (%)', 'rgba(0, 188, 212, 1)');  

    const socket = io();

    socket.on('update_data', function(msg) {
        const now = new Date().toLocaleTimeString();
        if (labelsData.length > 20) labelsData.shift();
        labelsData.push(now);

        for (const key in msg) {
            if (charts[key]) {
                const value = parseFloat(msg[key]);
                if (!isNaN(value)) {
                    const dataset = charts[key].data.datasets[0].data;
                    if (dataset.length > 20) dataset.shift();
                    dataset.push(value);
                    charts[key].update(); 

                    if (key === 'IAQ' || key === 'Rel_IAQ') {
                        updateAQIWarning(value);
                    }
                }
            }
        }
    });
</script>

</body>
</html>
