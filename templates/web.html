<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Giám sát Không khí AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; text-align: center; }
        .container { width: 80%; margin: 30px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .status-box { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 20px; }
        .good { background-color: #c8e6c9; color: #2e7d32; border: 1px solid #2e7d32; }
        .bad { background-color: #ffcdd2; color: #c62828; border: 1px solid #c62828; }
        .neutral { background-color: #fff9c4; color: #fbc02d; border: 1px solid #fbc02d; }
    </style>
</head>
<body>

<div class="container">
    <h2>BIỂU ĐỒ GIÁM SÁT CHẤT LƯỢNG KHÔNG KHÍ (AI EDGE)</h2>
    <canvas id="airChart"></canvas>
    
    <div id="statusResult" class="status-box neutral">
        Đang chờ dữ liệu từ Kit AI...
    </div>
</div>

<script>
    const ctx = document.getElementById('airChart').getContext('2d');
    const airChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], 
            datasets: [{
                label: 'Chỉ số chất lượng khí (AQI)',
                data: [],
                borderColor: '#2196f3',
                backgroundColor: 'rgba(33, 150, 243, 0.2)',
                borderWidth: 2,
                tension: 0.3,
                fill: true
            }]
        },
        options: {
            scales: { y: { beginAtZero: true } },
            animation: false 
        }
    });

    // Kết nối tới Server Python của Nhân
 const socket = io("http://192.168.1.7:5000", {
    transports: ["polling"],
    reconnectionDelay: 5000 
});

socket.on('connect', () => {
    console.log("--- CHÚC MỪNG! ĐÃ KẾT NỐI THÀNH CÔNG ---");
});

    socket.on('update_data', function(msg) {
        // Lấy dữ liệu thô từ Python
        let rawData = msg.value;
        
        // Dùng Regex để chỉ lấy con số (phòng trường hợp dữ liệu có chữ 'Sensor_Value:')
        let value = parseFloat(rawData.toString().replace(/[^0-9.]/g, ''));
        
        const now = new Date().toLocaleTimeString(); 
        
        // In ra để Nhân kiểm chứng số thực tế
        console.log("Số thực vẽ lên biểu đồ:", value);

        if (!isNaN(value)) { // Chỉ vẽ nếu là con số hợp lệ
            if (airChart.data.labels.length > 15) { 
                airChart.data.labels.shift();
                airChart.data.datasets[0].data.shift();
            }
            airChart.data.labels.push(now);
            airChart.data.datasets[0].data.push(value);
            airChart.update();

            // Cập nhật trạng thái hiển thị
            const statusDiv = document.getElementById('statusResult');
            if (value < 500) {
                statusDiv.innerText = "Kết quả: TỐT (" + value + ")";
                statusDiv.className = "status-box good";
            } else {
                statusDiv.innerText = "Kết quả: CẦN CHÚ Ý (" + value + ")";
                statusDiv.className = "status-box bad";
            }
        }
    });
</script>

</body>
</html>
